<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 150" width="120" height="150">
  <defs>
    <linearGradient id="fur" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9aa3ab"/>
      <stop offset="1" stop-color="#6f777e"/>
    </linearGradient>
    <linearGradient id="belly" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f6f8"/>
      <stop offset="1" stop-color="#d4dade"/>
    </linearGradient>
  </defs>

  <!-- queue -->
  <path d="M30 118 q-30 4 -28 -28 q1 -16 14 -16 q9 0 9 10 q0 10 -6 12 q14 6 11 22 z"
        fill="url(#fur)" stroke="#5b636a" stroke-width="2"/>

  <!-- corps -->
  <ellipse cx="62" cy="108" rx="34" ry="38" fill="url(#fur)" stroke="#5b636a" stroke-width="2"/>
  <!-- ventre -->
  <ellipse cx="62" cy="114" rx="19" ry="26" fill="url(#belly)"/>
  <!-- pattes avant -->
  <ellipse cx="50" cy="142" rx="11" ry="7" fill="url(#belly)" stroke="#c3cace" stroke-width="1.5"/>
  <ellipse cx="74" cy="142" rx="11" ry="7" fill="url(#belly)" stroke="#c3cace" stroke-width="1.5"/>

  <!-- rayures tabby -->
  <g stroke="#5b636a" stroke-width="3" stroke-linecap="round" opacity=".5" fill="none">
    <path d="M40 84 q6 6 4 14"/>
    <path d="M86 84 q-6 6 -4 14"/>
    <path d="M88 104 q-7 4 -8 12"/>
  </g>

  <!-- tête -->
  <g>
    <!-- oreilles -->
    <path d="M40 40 L34 14 L56 32 Z" fill="url(#fur)" stroke="#5b636a" stroke-width="2"/>
    <path d="M84 40 L92 14 L70 30 Z" fill="url(#fur)" stroke="#5b636a" stroke-width="2"/>
    <path d="M42 34 L40 22 L50 31 Z" fill="#e9a7b6"/>
    <path d="M80 33 L84 22 L74 30 Z" fill="#e9a7b6"/>
    <!-- crâne -->
    <circle cx="62" cy="54" r="28" fill="url(#fur)" stroke="#5b636a" stroke-width="2"/>
    <!-- museau clair -->
    <ellipse cx="62" cy="62" rx="18" ry="14" fill="url(#belly)"/>
    <!-- yeux -->
    <ellipse cx="51" cy="52" rx="6" ry="7" fill="#fff"/>
    <ellipse cx="73" cy="52" rx="6" ry="7" fill="#fff"/>
    <circle cx="52" cy="53" r="3.4" fill="#2b2b2b"/>
    <circle cx="74" cy="53" r="3.4" fill="#2b2b2b"/>
    <circle cx="53.2" cy="51.6" r="1.1" fill="#fff"/>
    <circle cx="75.2" cy="51.6" r="1.1" fill="#fff"/>
    <!-- nez + bouche -->
    <path d="M58 60 L66 60 L62 65 Z" fill="#e98ba0"/>
    <path d="M62 65 q-5 5 -9 3 M62 65 q5 5 9 3" stroke="#7a828a" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <!-- moustaches -->
    <g stroke="#cdd3d8" stroke-width="1.3" stroke-linecap="round">
      <path d="M46 60 L24 56 M46 64 L25 66 M78 60 L100 56 M78 64 L99 66"/>
    </g>
  </g>
</svg>
